set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

unbind r 
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Set prefix to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start numbering at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows 1

setw -g mode-keys vi

# Mouse: focar/redimensionar panes, rolar scrollback e enviar a roda para apps
# de tela alternativa (ex. Claude Code em fullscreen)
set -g mouse on

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Restaura o clear screen (Ctrl+l foi capturado pelo vim-tmux-navigator)
# Uso: prefix + Ctrl+l (Ctrl+a, Ctrl+l)
bind C-l send-keys 'C-l'

# Limpa o scrollback do pane (não afeta o contexto de apps como o Claude Code)
# Uso: prefix + Ctrl+k (Ctrl+a, Ctrl+k)
bind C-k send-keys 'C-l' \; clear-history \; display "Scrollback limpo"

#List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect: salva/restaura sessões (janelas, panes, diretórios)
# Uso manual: prefix + Ctrl-s (salvar) / prefix + Ctrl-r (restaurar)
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum: salva automaticamente e restaura ao abrir o tmux
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

#Themes
#source-file ~/.config/tmux/themes/tokyonight_moon.tmux
#source-file ~/.config/tmux/themes/tokyonight_storm.tmux
#source-file ~/.config/tmux/themes/tokyonight_night.tmux
#source-file ~/.config/tmux/themes/tokyonight_day.tmux
# source-file ~/.config/tmux/themes/dracula.tmux
# source-file ~/.config/tmux/themes/rose-pine.tmux
 source-file ~/.config/tmux/themes/catppuccin.tmux
# source-file ~/.config/tmux/themes/github_dark_dimmed.tmux

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
